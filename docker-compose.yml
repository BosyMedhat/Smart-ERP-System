version: '3.8'

services:
  # Service 1
    # ta7t service de kool el contairs aw kol el service ele ana mesta5demha fe el prnamg pta3e
  db:
    image: postgres:15
    container_name: erp_postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=erp_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpass
    ports:
      - "5432:5432"
  # Service 2 
  # 2. المساعد الذكي (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: erp_ai_brain
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always
# hena da el hard disk el 5argy pta3e ele ptshel el data sawa2 el fe el database aw el ollama 
volumes:
  postgres_data:  # لضمان بقاء بيانات العملاء والمبيعات
  ollama_data:    # لضمان بقاء موديلات الذكاء الاصطناعي



